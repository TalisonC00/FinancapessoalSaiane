<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minhas Finanças ✨</title>
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Finanças">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e84393">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-pink: #d63384;
            --bg: #fff9fb;
            --in: #2ecc71;
            --out: #ff4d4d;
        }
        body { 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .premium-header {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            color: white; padding: 50px 20px 60px 20px; border-radius: 0 0 35px 35px;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.2);
        }

        .header-labels {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px; border-radius: 18px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .card-premium { background: white; border: none; border-radius: 22px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); margin-bottom: 15px; }
        
        /* CORREÇÃO DA NAVEGAÇÃO: ARREDONDADO TOTAL */
        .nav-pills { 
            background: white !important; 
            border-radius: 50px !important; 
            padding: 5px !important; 
            border: 1px solid #eee;
        }
        .nav-link { 
            color: var(--primary-pink); 
            border-radius: 50px !important; /* Força o formato de pílula */
            font-weight: 500;
            padding: 10px 20px !important;
            border: none !important;
        }
        .nav-link.active { 
            background-color: var(--primary-pink) !important; 
            color: white !important; 
            box-shadow: 0 4px 10px rgba(214, 51, 132, 0.2);
        }
        
        /* BOTÃO CONFIRMAR: SEMPRE ACESO E ARREDONDADO */
        .btn-confirmar { 
            background-color: var(--primary-pink); 
            border: none; 
            border-radius: 50px !important; 
            padding: 15px; 
            font-weight: bold; 
            color: white; 
            width: 100%;
            opacity: 1 !important;
            box-shadow: 0 4px 12px rgba(214, 51, 132, 0.2);
        }

        .comentario-box { font-size: 0.85rem; color: #555; margin-top: 8px; padding-top: 5px; border-top: 1px dashed #fce4ec; }

        /* MODAL E TOAST */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fff; padding: 10px 20px; border-radius: 50px; z-index: 9999; display: none; }
        #modalConfirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 85%; }
        
        .hist-cofre-item { font-size: 0.8rem; border-bottom: 1px solid #fdf2f6; padding: 8px 0; }
    </style>
</head>
<body class="pb-5">

    <div id="toast"></div>

    <div id="modalConfirm">
        <div class="modal-box">
            <h5 class="mb-4">Deseja apagar esse registro? 🌸</h5>
            <div class="d-flex gap-2">
                <button onclick="fecharModal()" class="btn btn-light w-100 rounded-pill">Cancelar</button>
                <button id="btnConfirmarDelete" class="btn btn-danger w-100 rounded-pill">Apagar</button>
            </div>
        </div>
    </div>

    <div class="premium-header text-center">
        <small class="text-uppercase" style="letter-spacing: 1.5px; opacity: 0.9; font-weight: 600;">Saldo em Conta</small>
        <h1 class="display-4 fw-bold mb-3" id="resumoSaldo">R$ 0,00</h1>
        <div class="d-flex justify-content-center gap-2">
            <div class="header-labels small"><i class="bi bi-arrow-up-circle-fill" style="color: #b9ffdb;"></i> <span id="resumoEntradas" class="fw-bold">R$ 0,00</span></div>
            <div class="header-labels small"><i class="bi bi-arrow-down-circle-fill" style="color: #ffd1d1;"></i> <span id="resumoSaidas" class="fw-bold">R$ 0,00</span></div>
        </div>
    </div>

    <div class="container mt-n3" style="margin-top: -30px; position: relative; z-index: 10;">
        <ul class="nav nav-pills nav-fill mb-4 shadow-sm" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#aba-novo">✨ Novo</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-extrato">📃 Extrato</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-poupanca">💰 Cofre</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="aba-novo">
                <div class="card card-premium p-4">
                    <select id="mes" class="form-select border-0 bg-light mb-3" onchange="renderizar()"></select>
                    
                    <div class="btn-group w-100 mb-3 shadow-sm" style="border-radius: 12px; overflow: hidden;">
                        <input type="radio" class="btn-check" name="tipo" id="tipoEntrada" value="Entrada" checked onchange="ajustarCampos()">
                        <label class="btn btn-outline-success border-0 py-2" for="tipoEntrada">Ganhei</label>
                        <input type="radio" class="btn-check" name="tipo" id="tipoSaida" value="Saída" onchange="ajustarCampos()">
                        <label class="btn btn-outline-danger border-0 py-2" for="tipoSaida">Gastei</label>
                    </div>

                    <input type="text" id="desc" class="form-control mb-2 border-0 bg-light" placeholder="O que foi?">
                    <input type="number" id="valor" class="form-control mb-2 border-0 bg-light" placeholder="Valor R$">
                    
                    <div id="contComent" style="display:none;">
                        <input type="text" id="comentario" class="form-control mb-3 border-0 bg-light" placeholder="🌸 Adicionar comentário...">
                    </div>

                    <button onclick="adicionarRegistro()" class="btn-confirmar shadow-sm">Confirmar ✨</button>
                </div>
            </div>

            <div class="tab-pane fade" id="aba-extrato"><div id="listaExtrato"></div></div>

            <div class="tab-pane fade" id="aba-poupanca">
                <div class="card card-premium p-4 text-center">
                    <div class="mb-2"><i class="bi bi-gem display-4" style="color: #e84393;"></i></div>
                    <h2 class="fw-bold mb-4" id="totalCofre" style="color: #ad1457;">R$ 0,00</h2>
                    <input type="number" id="valorPoupanca" class="form-control mb-3 border-0 bg-light text-center" placeholder="Valor R$">
                    <div class="d-flex gap-2 mb-4">
                        <button onclick="gerirPoupanca('add')" class="btn btn-confirmar py-2 shadow-sm">Poupar</button>
                        <button onclick="gerirPoupanca('sub')" class="btn btn-outline-danger w-100 py-2 rounded-pill">Resgatar</button>
                    </div>
                    <div id="listaHistCofre" class="text-start" style="font-size: 0.8rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let dados = JSON.parse(localStorage.getItem('fin_saiane_final_v6')) || { transacoes: [], cofre: 0, histCofre: [] };
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const selMes = document.getElementById('mes');
        const mesAtualIdx = new Date().getMonth();
        meses.forEach((m, idx) => {
            const opt = document.createElement('option');
            opt.value = m; opt.text = m;
            if(idx === mesAtualIdx) opt.selected = true;
            selMes.add(opt);
        });

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

        function ajustarCampos() {
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            document.getElementById('contComent').style.display = (tipo === "Saída") ? "block" : "none";
        }

        function adicionarRegistro() {
            const desc = document.getElementById('desc').value, val = parseFloat(document.getElementById('valor').value) || 0;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            if (!desc || val <= 0) return showToast("Preencha os campos! 🌸");
            dados.transacoes.push({ id: Date.now(), mes: selMes.value, desc, valor: val, tipo, coment: tipo === "Saída" ? document.getElementById('comentario').value : "" });
            salvar();
            document.getElementById('desc').value = ""; document.getElementById('valor').value = ""; document.getElementById('comentario').value = "";
            showToast("Lançado! ✨");
        }

        function gerirPoupanca(t) {
            const v = parseFloat(document.getElementById('valorPoupanca').value) || 0;
            if (v <= 0) return;
            dados.cofre = (t === 'add') ? dados.cofre + v : dados.cofre - v;
            dados.histCofre.unshift({ id: Date.now(), v, t, data: new Date().toLocaleDateString() });
            document.getElementById('valorPoupanca').value = ""; salvar();
            showToast("Cofre atualizado! 💎");
        }

        let idApagar = null, tipoApagar = '';
        function abrirModal(id, tipo) { idApagar = id; tipoApagar = tipo; document.getElementById('modalConfirm').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }
        document.getElementById('btnConfirmarDelete').onclick = function() {
            if(tipoApagar === 't') dados.transacoes = dados.transacoes.filter(x => x.id !== idApagar);
            else dados.histCofre = dados.histCofre.filter(x => x.id !== idApagar);
            salvar(); fecharModal(); showToast("Removido! 🗑️");
        };

        function salvar() { localStorage.setItem('fin_saiane_final_v6', JSON.stringify(dados)); renderizar(); }

        function renderizar() {
            const lista = document.getElementById('listaExtrato'); lista.innerHTML = "";
            let entM = 0; let saiM = 0;
            dados.transacoes.filter(t => t.mes === selMes.value).forEach((t) => {
                const isE = t.tipo === "Entrada";
                if(isE) entM += t.valor; else saiM += t.valor;
                lista.innerHTML += `<div class="card card-premium p-3 mb-2 border-start border-4 ${isE ? 'border-success' : 'border-danger'}"><div class="d-flex justify-content-between align-items-center"><div class="d-flex align-items-center gap-3"><i class="bi bi-trash btn-delete fs-5" onclick="abrirModal(${t.id}, 't')"></i><div><small class="text-muted d-block" style="font-size:0.7rem">${t.tipo}</small><strong>${t.desc}</strong></div></div><div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'} R$ ${t.valor.toFixed(2)}</div></div>${t.coment ? `<div class="comentario-box">🌸 ${t.coment}</div>` : ''}</div>`;
            });

            const listH = document.getElementById('listaHistCofre'); listH.innerHTML = "";
            dados.histCofre.forEach(x => {
                const isAdd = x.t === 'add';
                listH.innerHTML += `<div class="hist-cofre-item d-flex justify-content-between"><span><i class="bi bi-trash3 me-2 opacity-50" onclick="abrirModal(${x.id}, 'h')"></i><small>${x.data}</small></span><span class="${isAdd ? 'text-success' : 'text-danger'} fw-bold">${isAdd ? '+' : '-'}- R$ ${x.v.toFixed(2)}</span></div>`;
            });

            document.getElementById('resumoEntradas').innerText = "R$ " + entM.toFixed(2);
            document.getElementById('resumoSaidas').innerText = "R$ " + saiM.toFixed(2);
            document.getElementById('resumoSaldo').innerText = "R$ " + (entM - saiM).toFixed(2);
            document.getElementById('totalCofre').innerText = "R$ " + dados.cofre.toFixed(2);
        }
        renderizar();
    </script>
</body>
</html>
