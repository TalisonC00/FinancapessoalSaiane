<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minhas Finanças ✨</title>
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Finanças">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e84393">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-pink: #d63384;
            --bg: #fff9fb;
        }
        body { 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Cabeçalho Premium Rosa */
        .premium-header {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            color: white; padding: 50px 20px 60px 20px; border-radius: 0 0 35px 35px;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.2);
        }

        .header-labels {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px; border-radius: 18px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .card-premium { background: white; border: none; border-radius: 22px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); margin-bottom: 15px; }
        .nav-pills { background: #fce4ec; border-radius: 50px; padding: 4px; }
        .nav-link.active { background-color: var(--primary-pink) !important; border-radius: 50px; color: white !important; }
        .btn-confirmar { background-color: var(--primary-pink); border: none; border-radius: 50px; padding: 15px; font-weight: bold; color: white; width: 100%; }
        .btn-delete { color: #f48fb1; }
    </style>
</head>
<body class="pb-5">

    <div class="premium-header text-center">
        <small class="text-uppercase" style="letter-spacing: 1.5px; opacity: 0.9; font-weight: 600;">Saldo em Conta</small>
        <h1 class="display-4 fw-bold mb-3" id="resumoSaldo">R$ 0,00</h1>
        
        <div class="d-flex justify-content-center gap-2">
            <div class="header-labels small">
                <i class="bi bi-arrow-up-circle-fill" style="color: #b9ffdb;"></i> 
                <span id="resumoEntradas" class="fw-bold">R$ 0,00</span>
            </div>
            <div class="header-labels small">
                <i class="bi bi-arrow-down-circle-fill" style="color: #ffd1d1;"></i> 
                <span id="resumoSaidas" class="fw-bold">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="container mt-n3" style="margin-top: -30px; position: relative; z-index: 10;">
        <ul class="nav nav-pills nav-fill mb-4 shadow-sm bg-white" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#aba-novo">✨ Novo</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-extrato">📃 Extrato</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-poupanca">💰 Cofre</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="aba-novo">
                <div class="card card-premium p-4">
                    <select id="mes" class="form-select border-0 bg-light mb-3" onchange="renderizar()">
                        <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
                        <option>Abril</option><option>Maio</option><option>Junho</option>
                        <option>Julho</option><option>Agosto</option><option>Setembro</option>
                        <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
                    </select>
                    <div class="btn-group w-100 mb-3">
                        <input type="radio" class="btn-check" name="tipo" id="tipoEntrada" value="Entrada" checked>
                        <label class="btn btn-outline-success" for="tipoEntrada">Ganhei</label>
                        <input type="radio" class="btn-check" name="tipo" id="tipoSaida" value="Saída">
                        <label class="btn btn-outline-danger" for="tipoSaida">Gastei</label>
                    </div>
                    <input type="text" id="desc" class="form-control mb-2 border-0 bg-light" placeholder="O que foi?">
                    <input type="number" id="valor" class="form-control mb-4 border-0 bg-light" placeholder="Valor R$">
                    <button onclick="adicionarRegistro()" class="btn-confirmar shadow-sm">Confirmar ✨</button>
                </div>
            </div>

            <div class="tab-pane fade" id="aba-extrato">
                <div id="listaExtrato"></div>
            </div>

            <div class="tab-pane fade" id="aba-poupanca">
                <div class="card card-premium p-4 text-center">
                    <div class="mb-2"><i class="bi bi-gem display-4" style="color: #e84393;"></i></div>
                    <h6 class="text-muted">Meu Cofre</h6>
                    <h2 class="fw-bold mb-4" id="totalCofre" style="color: #ad1457;">R$ 0,00</h2>
                    <input type="number" id="valorPoupanca" class="form-control mb-3 border-0 bg-light text-center" placeholder="Valor R$">
                    <div class="d-flex gap-2">
                        <button onclick="gerirPoupanca('add')" class="btn btn-confirmar py-2">Poupar</button>
                        <button onclick="gerirPoupanca('sub')" class="btn btn-outline-danger w-100 py-2 rounded-pill">Resgatar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let dados = JSON.parse(localStorage.getItem('financas_ios_final')) || { transacoes: [], cofre: 0 };
        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function adicionarRegistro() {
            const mes = document.getElementById('mes').value;
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value) || 0;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            if (!desc || valor <= 0) return alert("Preencha os campos!");
            dados.transacoes.push({ id: Date.now(), mes, desc, valor, tipo });
            salvar();
            document.getElementById('desc').value = ""; document.getElementById('valor').value = "";
        }

        function removerRegistro(id) {
            if(confirm("Apagar registro?")) {
                dados.transacoes = dados.transacoes.filter(t => t.id !== id);
                salvar();
            }
        }

        function gerirPoupanca(t) {
            const v = parseFloat(document.getElementById('valorPoupanca').value) || 0;
            if (v <= 0) return;
            dados.cofre = (t === 'add') ? dados.cofre + v : dados.cofre - v;
            document.getElementById('valorPoupanca').value = "";
            salvar();
        }

        function salvar() {
            localStorage.setItem('financas_ios_final', JSON.stringify(dados));
            renderizar();
        }

        function renderizar() {
            const mesAtual = document.getElementById('mes').value;
            const lista = document.getElementById('listaExtrato');
            lista.innerHTML = "";
            let entM = 0; let saiM = 0;
            const itens = dados.transacoes.filter(t => t.mes === mesAtual);

            if (itens.length === 0) lista.innerHTML = `<div class="text-center opacity-50 py-5">Nenhum registro 🌸</div>`;

            itens.forEach((t) => {
                const isE = t.tipo === "Entrada";
                if(isE) entM += t.valor; else saiM += t.valor;
                lista.innerHTML += `
                    <div class="card card-premium p-3 mb-2 border-start border-4 ${isE ? 'border-success' : 'border-danger'}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <i class="bi bi-trash btn-delete fs-5" onclick="removerRegistro(${t.id})"></i>
                                <div><small class="text-muted d-block" style="font-size:0.7rem">${t.tipo}</small><strong>${t.desc}</strong></div>
                            </div>
                            <div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'} ${formatar(t.valor)}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('resumoEntradas').innerText = formatar(entM);
            document.getElementById('resumoSaidas').innerText = formatar(saiM);
            document.getElementById('resumoSaldo').innerText = formatar(entM - saiM);
            document.getElementById('totalCofre').innerText = formatar(dados.cofre);
        }
        renderizar();
    </script>
</body>
</html>
